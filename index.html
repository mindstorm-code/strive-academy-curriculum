<!DOCTYPE html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Strive Academy · Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    /* cosmic grounds */
    --void:#050311;--deep:#0B0620;--low:#091028;
    --panel:#140B2E;--panel-2:#190F38;
    /* brand accents */
    --cyan:#1CCBFF;--cyan-soft:#7FE0FF;
    --gold:#F5B233;--gold-soft:#FFCB5E;
    --green:#4EDB7A;--purple:#8D63FF;--purple-soft:#B49BFF;
    --danger:#E74C3C;
    /* ion kept as alias → brand cyan (used by render JS) */
    --ion:#1CCBFF;
    /* text */
    --star:#F6F8FF;--mute:#BFC7E6;--mute-2:#838DBE;
    /* hairlines */
    --line:rgba(28,203,255,.22);--line-soft:rgba(191,199,230,.14);
    --disp:'Space Grotesk','Trebuchet MS',sans-serif;
    --mono:'Space Grotesk',ui-monospace,monospace;
    --body:'Sora',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0;font-family:var(--body);color:var(--star);line-height:1.55;
    background:
      radial-gradient(900px 620px at 10% 4%, rgba(28,203,255,.12), transparent 60%),
      radial-gradient(880px 600px at 90% -2%, rgba(245,178,51,.11), transparent 58%),
      radial-gradient(1200px 860px at 50% 112%, rgba(141,99,255,.16), transparent 62%),
      linear-gradient(180deg, var(--void), var(--deep) 45%, var(--low));
    background-attachment:fixed;min-height:100vh;
  }
  /* signature 48px dot grid, masked to fade out toward the edges */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:radial-gradient(rgba(191,199,230,.18) 1px, transparent 1.4px);
    background-size:48px 48px;
    -webkit-mask-image:radial-gradient(125% 95% at 50% 0%, #000 32%, transparent 80%);
    mask-image:radial-gradient(125% 95% at 50% 0%, #000 32%, transparent 80%);
  }

  .shell{position:relative;z-index:1;display:grid;grid-template-columns:248px 1fr;min-height:100vh}

  aside{
    border-right:1px solid var(--line-soft);padding:26px 18px;position:sticky;top:0;height:100vh;
    background:linear-gradient(180deg, rgba(22,14,52,.7), rgba(10,6,30,.5));backdrop-filter:blur(4px);
    overflow-y:auto;
  }
  .crest{display:flex;align-items:center;gap:11px;margin-bottom:26px}
  .crest .star{width:30px;height:30px;border:1.5px solid var(--gold);border-radius:50%;display:grid;place-items:center;color:var(--gold);font-size:13px;flex:0 0 auto}
  .crest .id{font-family:var(--mono);font-size:10.5px;letter-spacing:.26em;color:var(--gold-soft);text-transform:uppercase;line-height:1.5}
  .crest .id span{color:var(--mute-2);display:block;letter-spacing:.24em;font-size:9px;margin-top:2px}

  .leveltoggle{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;padding:5px;margin:0 2px 4px;border:1px solid var(--line-soft);border-radius:12px;background:rgba(10,6,30,.5)}
  .lt{cursor:pointer;border:0;background:transparent;color:var(--mute);font-family:var(--disp);font-weight:600;font-size:12px;letter-spacing:-.01em;padding:8px 0 7px;border-radius:9px;transition:.18s}
  .lt small{display:block;font-family:var(--mono);font-size:7.5px;letter-spacing:.12em;color:var(--mute-2);margin-top:3px}
  .lt:hover{color:var(--star)}
  .lt[aria-current="true"]{background:linear-gradient(180deg,rgba(28,203,255,.2),rgba(28,203,255,.06));color:var(--cyan-soft);box-shadow:0 0 16px rgba(28,203,255,.16)}
  .lt[aria-current="true"] small{color:var(--cyan)}

  .navlabel{font-family:var(--mono);font-size:9.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--mute-2);margin:22px 6px 9px}
  .navbtn{
    display:flex;align-items:center;gap:9px;width:100%;text-align:left;cursor:pointer;
    background:transparent;border:0;color:var(--mute);font-family:var(--body);font-size:14px;
    padding:9px 11px;border-radius:9px;transition:background .18s, color .18s;
  }
  .navbtn:hover{background:rgba(154,166,196,.07);color:var(--star)}
  .navbtn[aria-current="true"]{background:rgba(28,203,255,.13);color:var(--cyan-soft);font-weight:600}
  .navbtn .dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.6;flex:0 0 auto}

  .gradepills{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin:4px 4px 0}
  .gradepills[hidden]{display:none}
  .gp{
    cursor:pointer;border:1px solid var(--line-soft);background:rgba(26,17,58,.4);color:var(--mute);
    border-radius:9px;padding:11px 0;font-family:var(--disp);font-weight:600;font-size:15px;transition:.18s;
  }
  .gp:hover{border-color:var(--line);color:var(--star)}
  .gp[aria-current="true"]{background:linear-gradient(180deg,rgba(28,203,255,.18),rgba(20,13,46,.4));border-color:rgba(28,203,255,.5);color:var(--cyan-soft)}
  .gp small{display:block;font-family:var(--mono);font-size:8px;letter-spacing:.12em;color:var(--mute-2);margin-top:3px;text-transform:uppercase}

  main{padding:48px 44px 80px;max-width:1080px}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--cyan);margin:0 0 12px}
  h1{font-family:var(--disp);font-weight:700;font-size:clamp(30px,4.6vw,48px);line-height:1.04;margin:0;letter-spacing:-.018em}
  h1 .sub{display:block;font-size:clamp(14px,2vw,17px);font-weight:500;color:var(--mute);margin-top:13px;font-family:var(--body)}

  .sec-label{display:flex;align-items:center;gap:14px;margin:38px 0 20px}
  .sec-label .num{font-family:var(--mono);font-size:12px;color:var(--cyan);border:1.5px solid var(--cyan);width:30px;height:30px;border-radius:50%;display:grid;place-items:center;flex:0 0 auto;box-shadow:0 0 18px rgba(28,203,255,.18)}
  .sec-label h2{font-family:var(--disp);font-weight:600;font-size:21px;margin:0;letter-spacing:-.018em}
  .sec-label .rule{height:1px;flex:1;background:linear-gradient(90deg,var(--line),transparent)}

  .lede{color:var(--mute);max-width:72ch;margin:0 0 24px;font-size:15px}
  .lede strong{color:var(--cyan-soft);font-weight:600}

  .hero{border:1px solid var(--line);background:linear-gradient(180deg, rgba(34,22,74,.55), rgba(16,10,42,.38));border-radius:18px;padding:34px 32px;position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;right:-60px;top:-60px;width:210px;height:210px;border-radius:50%;background:radial-gradient(circle at 30% 30%, rgba(245,178,51,.2), transparent 65%)}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-top:26px}
  .stat{border:1px solid var(--line-soft);border-radius:12px;padding:16px 16px 14px;background:rgba(26,17,58,.45)}
  .stat b{font-family:var(--disp);font-size:30px;font-weight:700;color:var(--gold-soft);display:block;line-height:1}
  .stat span{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute-2);display:block;margin-top:8px}

  .cycle{display:flex;flex-wrap:wrap;gap:9px;margin:0 0 24px}
  .step{flex:1 1 0;min-width:118px;border:1px solid var(--line-soft);border-radius:12px;padding:13px 13px 15px;background:rgba(26,17,58,.5);position:relative}
  .step .k{font-family:var(--mono);font-size:10px;letter-spacing:.16em;color:var(--cyan);text-transform:uppercase}
  .step .q{display:block;margin-top:7px;font-size:12.5px;color:var(--star);font-weight:500}
  .step .arrow{position:absolute;right:-11px;top:50%;transform:translateY(-50%);color:var(--mute-2);font-size:13px;z-index:2}
  .step.mastery{border-color:rgba(78,219,122,.5);background:linear-gradient(180deg,rgba(78,219,122,.14),rgba(20,13,46,.5))}
  .step.mastery .k{color:var(--green)}
  .step.mastery .arrow{display:none}

  .pillars{display:grid;grid-template-columns:repeat(2,1fr);gap:13px}
  .pillar{border-left:2px solid var(--line);padding:3px 0 3px 15px}
  .pillar h4{margin:0 0 5px;font-size:13.5px;font-family:var(--disp);font-weight:600}
  .pillar p{margin:0;font-size:13px;color:var(--mute)}
  .pillar.tutor{border-left-color:var(--purple)}
  .pillar.tutor h4{color:var(--purple-soft)}

  .gradehead{display:flex;align-items:baseline;gap:16px;flex-wrap:wrap}
  .band{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--cyan);border:1px solid var(--line);border-radius:999px;padding:5px 12px}
  .support{display:flex;gap:11px;align-items:flex-start;border:1px solid rgba(141,99,255,.34);background:linear-gradient(180deg,rgba(141,99,255,.10),rgba(20,13,46,.34));border-radius:12px;padding:16px 18px;margin:22px 0 8px}
  .support .ic{color:var(--purple-soft);font-size:18px;line-height:1.2}
  .support b{color:var(--purple-soft)}
  .support p{margin:4px 0 0;font-size:13.5px;color:var(--mute)}

  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;margin-top:18px}
  .card{border:1px solid var(--line-soft);border-radius:14px;padding:20px 20px 22px;background:linear-gradient(180deg, rgba(30,20,66,.5), rgba(16,10,42,.32));transition:transform .22s ease, border-color .22s ease}
  .card:hover{transform:translateY(-3px);border-color:var(--line)}
  .card.wide{grid-column:1 / -1}
  .card .tag{font-family:var(--mono);font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--cyan)}
  .card h3{font-family:var(--disp);font-weight:600;font-size:18px;margin:7px 0 12px;letter-spacing:.01em}
  .card .note{color:var(--mute);font-size:13px;margin:-4px 0 13px}

  ul.clean{list-style:none;margin:0;padding:0}
  ul.clean li{position:relative;padding:6px 0 6px 17px;font-size:13.5px;color:var(--star);border-bottom:1px solid rgba(154,166,196,.08)}
  ul.clean li:last-child{border-bottom:0}
  ul.clean li::before{content:"";position:absolute;left:0;top:12px;width:5px;height:5px;background:var(--cyan);border-radius:50%;box-shadow:0 0 8px rgba(28,203,255,.5)}
  ul.clean li .by{color:var(--mute-2);font-size:12px}
  .sub-h{font-family:var(--mono);font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--mute-2);margin:16px 0 9px}
  .sub-h:first-child{margin-top:2px}

  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{font-size:12px;color:var(--star);border:1px solid var(--line-soft);border-radius:999px;padding:5px 11px;background:rgba(26,17,58,.4)}
  .chip b{color:var(--mute-2);font-weight:400;font-size:10.5px}

  .spine{display:flex;flex-wrap:wrap;gap:8px;margin:4px 0 26px}
  .spine .s{flex:1 1 0;min-width:130px;border:1px solid var(--line-soft);border-radius:11px;padding:13px;background:rgba(26,17,58,.45)}
  .spine .s .k{font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--ion);text-transform:uppercase}
  .spine .s p{margin:7px 0 0;font-size:12px;color:var(--mute)}
  .flow{font-family:var(--mono);font-size:11.5px;letter-spacing:.06em;color:var(--gold-soft);background:rgba(245,178,51,.08);border:1px solid var(--line);border-radius:10px;padding:13px 16px;margin:0 0 24px;text-align:center}

  details.cat{border:1px solid var(--line-soft);border-radius:13px;background:linear-gradient(180deg, rgba(30,20,66,.5), rgba(16,10,42,.32));margin-bottom:12px;overflow:hidden}
  details.cat[open]{border-color:var(--line)}
  /* required-to-graduate tracks → gold */
  details.cat.req{border-color:rgba(245,178,51,.45);background:linear-gradient(180deg,rgba(245,178,51,.08),rgba(16,10,42,.34))}
  details.cat.req[open]{border-color:rgba(245,178,51,.6)}
  details.cat.req .catno{color:var(--gold);border-color:rgba(245,178,51,.55);box-shadow:0 0 16px rgba(245,178,51,.18)}
  details.cat.req[open] .chev{color:var(--gold)}
  .reqtag{font-family:var(--mono);font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);border:1px solid rgba(245,178,51,.5);border-radius:999px;padding:2px 8px;margin-left:10px;vertical-align:middle;white-space:nowrap}
  .certrow.req{border-color:rgba(245,178,51,.4);background:linear-gradient(180deg,rgba(245,178,51,.08),rgba(26,17,58,.4));color:var(--gold-soft)}
  .certrow.req .n{color:var(--gold)}
  details.cat summary{list-style:none;cursor:pointer;padding:18px 20px;display:flex;align-items:center;gap:14px}
  details.cat summary::-webkit-details-marker{display:none}
  .catno{font-family:var(--mono);font-size:12px;color:var(--cyan);border:1.5px solid var(--line);border-radius:8px;width:34px;height:34px;display:grid;place-items:center;flex:0 0 auto}
  .cattitle{flex:1}
  .cattitle h3{font-family:var(--disp);font-weight:600;font-size:17px;margin:0;letter-spacing:.01em}
  .cattitle .cert{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute-2);margin-top:4px;display:block}
  .chev{color:var(--mute-2);transition:transform .2s;font-size:13px}
  details.cat[open] .chev{transform:rotate(90deg);color:var(--cyan)}
  .catbody{padding:2px 20px 22px}
  .ecgroup{margin-top:16px}
  .ecgroup .gh{font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--cyan-soft);margin:0 0 9px}

  .bands{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:13px;margin-top:6px}
  .bandcard{border:1px solid var(--line-soft);border-radius:13px;padding:18px;background:rgba(26,17,58,.4)}
  .bandcard .lvl{font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;color:var(--gold);text-transform:uppercase}
  .bandcard h4{font-family:var(--disp);font-weight:600;font-size:16px;margin:5px 0 4px}
  .bandcard .gr{font-size:12px;color:var(--mute-2);margin-bottom:10px}
  .bandcard ul{margin:0;padding:0;list-style:none}
  .bandcard li{font-size:12.5px;color:var(--mute);padding:2px 0}
  .bandcard .cert2{margin-top:12px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--gold-soft)}

  .certlist{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-top:6px}
  .certrow{display:flex;align-items:center;gap:11px;border:1px solid var(--line-soft);border-radius:10px;padding:12px 14px;background:rgba(26,17,58,.4);font-size:13.5px}
  .certrow .n{font-family:var(--mono);font-size:11px;color:var(--gold);flex:0 0 auto}

  /* ranks */
  .dims{display:grid;grid-template-columns:repeat(5,1fr);gap:11px;margin:4px 0 28px}
  .dim{border:1px solid var(--line-soft);border-radius:11px;padding:14px;background:rgba(26,17,58,.45);text-align:center}
  .dim .k{font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--cyan);text-transform:uppercase}
  .dim p{margin:7px 0 0;font-size:11.5px;color:var(--mute)}

  .ladder{margin-top:8px}
  .rank{display:grid;grid-template-columns:64px 1fr;gap:18px;padding:0 0 18px;position:relative}
  .rank::before{content:"";position:absolute;left:31px;top:60px;bottom:-2px;width:2px;background:linear-gradient(180deg,var(--rc,var(--line)),transparent)}
  .rank:last-child::before{display:none}
  .medal{width:64px;height:64px;border-radius:50%;display:grid;place-items:center;font-family:var(--disp);font-weight:700;font-size:23px;border:2px solid var(--rc,var(--gold));color:var(--rc,var(--gold));background:rgba(10,6,30,.65);z-index:1}
  .rankcard{border:1px solid var(--line-soft);border-radius:14px;padding:18px 20px 20px;background:linear-gradient(180deg, rgba(30,20,66,.5), rgba(16,10,42,.32))}
  .rankcard .top{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  .rankcard h3{font-family:var(--disp);font-weight:700;font-size:20px;margin:0;color:var(--rc,var(--star))}
  .rankcard .motto{font-size:13px;color:var(--mute);font-style:italic}
  .rankcard .insig{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute-2);margin-top:4px}
  .rankcard .meaning{font-size:13px;color:var(--mute);margin:9px 0 13px}
  .rankcols{display:grid;grid-template-columns:1.35fr 1fr;gap:20px}
  .rankcols .gh{font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-soft);margin:0 0 8px}
  .certline{margin-top:13px;font-family:var(--mono);font-size:10px;letter-spacing:.03em;color:var(--gold-soft);border-top:1px solid var(--line-soft);padding-top:11px}
  .rank.lum .rankcard{border-color:rgba(255,203,94,.55);background:linear-gradient(180deg,rgba(255,203,94,.12),rgba(26,17,58,.35))}

  .rays{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:6px}
  .ray{border:1px solid var(--line-soft);border-radius:12px;padding:15px 16px;background:rgba(26,17,58,.42)}
  .ray h4{font-family:var(--disp);font-weight:600;font-size:14.5px;margin:0 0 8px;color:var(--gold-soft)}
  .ray ul{margin:0;padding:0;list-style:none}
  .ray li{font-size:12.5px;color:var(--mute);padding:2px 0 2px 14px;position:relative}
  .ray li::before{content:"";position:absolute;left:0;top:9px;width:4px;height:4px;border-radius:50%;background:var(--gold);opacity:.7}
  .ray.ai{border-color:rgba(141,99,255,.32);background:linear-gradient(180deg,rgba(141,99,255,.09),rgba(26,17,58,.42))}

  .board{border:1px solid var(--line-soft);border-radius:13px;padding:20px 22px;background:rgba(26,17,58,.4);margin-top:6px}
  .board .quote{font-family:var(--disp);font-size:16px;color:var(--star);margin:0 0 6px}
  .board .sub2{font-size:13px;color:var(--mute);margin:0 0 16px}

  footer{margin-top:50px;border-top:1px solid var(--line-soft);padding-top:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:space-between}
  footer .l{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--mute-2)}
  footer .l .s{color:var(--gold)}
  footer .r{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;color:var(--mute-2);text-transform:uppercase}

  /* secondary course catalog */
  .deptintro{display:flex;flex-wrap:wrap;gap:9px;margin:4px 0 24px}
  .deptintro .s{flex:1 1 0;min-width:150px;border:1px solid var(--line-soft);border-radius:12px;padding:14px;background:rgba(26,17,58,.45)}
  .deptintro .s b{font-family:var(--disp);font-size:24px;font-weight:700;color:var(--gold-soft);display:block;line-height:1}
  .deptintro .s span{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute-2);display:block;margin-top:7px}
  .deptgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:13px;margin-top:6px}
  .deptcard{border:1px solid var(--line-soft);border-radius:14px;padding:18px 20px 20px;background:linear-gradient(180deg,rgba(30,20,66,.5),rgba(16,10,42,.32));text-align:left;cursor:pointer;transition:transform .2s,border-color .2s}
  .deptcard:hover{transform:translateY(-3px);border-color:var(--line)}
  .deptcard .dn{font-family:var(--mono);font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--cyan)}
  .deptcard h3{font-family:var(--disp);font-weight:600;font-size:18px;margin:7px 0 6px;letter-spacing:-.018em}
  .deptcard p{margin:0;font-size:13px;color:var(--mute)}
  .deptcard .ct{margin-top:12px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--gold-soft)}

  .courses{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:6px}
  .course{border:1px solid var(--line-soft);border-radius:13px;padding:15px 17px 16px;background:linear-gradient(180deg,rgba(30,20,66,.48),rgba(16,10,42,.3));position:relative}
  .course .gr{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute-2)}
  .course h4{font-family:var(--disp);font-weight:600;font-size:15.5px;margin:5px 0 0;letter-spacing:-.015em;color:var(--star)}
  .course p{margin:7px 0 0;font-size:12.5px;color:var(--mute)}

<script>
/* ───── Access gate (soft client-side lock — deterrent, not real security) ───── */
(function(){
  var KEY="strive_gate_ok", CODE="ELJEFFE";
  var gate=document.getElementById("gate");
  if(sessionStorage.getItem(KEY)==="1"){ gate.hidden=true; return; }
  var form=document.getElementById("gateForm"),
      pass=document.getElementById("gatePass"),
      err=document.getElementById("gateErr");
  form.addEventListener("submit",function(e){
    e.preventDefault();
    if(pass.value.trim().toUpperCase()===CODE){
      sessionStorage.setItem(KEY,"1"); gate.hidden=true;
    } else {
      err.textContent="Incorrect access code."; pass.value=""; pass.focus();
    }
  });
})();
</script>

const main = document.getElementById("main");
const chips = items => `<div class="chips">${items.map(i=>`<span class="chip">${i}</span>`).join("")}</div>`;
const list  = items => `<ul class="clean">${items.map(i=>`<li>${i}</li>`).join("")}</ul>`;
function block(b){
  if(b.kind==="note") return `<p class="note" style="margin:0">${b.text}</p>`;
  const lab = b.label ? `<p class="sub-h">${b.label}</p>` : "";
  return lab + (b.kind==="chips" ? chips(b.items) : list(b.items));
}
function subjectCard(s){
  return `<div class="card${s.wide?" wide":""}"><span class="tag">${s.tag}</span><h3>${s.name}</h3>${s.note?`<p class="note">${s.note}</p>`:""}${s.blocks.map(block).join("")}</div>`;
}

let LEVEL = "primary";
const gp = document.getElementById("gradepills");
const coreLabel = document.getElementById("coreLabel");
const PILLBAND = {K:"Explorer",1:"Explorer",2:"Explorer",3:"Builder",4:"Builder",5:"Builder",6:"Pathfinder",7:"Pathfinder",8:"Pathfinder",9:"Apprentice",10:"Apprentice",11:"Launch",12:"Launch"};

function buildGradePills(lvl){
  const arr = lvl==="secondary" ? [7,8,9,10,11,12] : ["K",1,2,3,4,5,6];
  gp.innerHTML = arr.map(n=>`<button class="gp" data-grade="${n}">${n}<small>${PILLBAND[n]}</small></button>`).join("");
}

function clearCurrent(){ document.querySelectorAll('.navbtn,[data-grade],[data-dept]').forEach(b=>b.removeAttribute('aria-current')); }
function go(view, arg){
  clearCurrent();
  let mode="other";
  if(view==="overview"){ document.querySelector('[data-view="overview"]').setAttribute('aria-current','true'); if(LEVEL==="college"){renderCollege();mode="college";}else if(LEVEL==="secondary")renderSecondaryOverview();else renderOverview(); }
  else if(view==="ec"){ document.querySelector('[data-view="ec"]').setAttribute('aria-current','true'); renderEC(); }
  else if(view==="ranks"){ document.querySelector('[data-view="ranks"]').setAttribute('aria-current','true'); renderRanks(); }
  else if(view==="journal"){ document.querySelector('[data-view="journal"]').setAttribute('aria-current','true'); renderJournal(); }
  else if(view==="clubs"){ document.querySelector('[data-view="clubs"]').setAttribute('aria-current','true'); renderClubs(); }
  else if(view==="rentals"){ document.querySelector('[data-view="rentals"]').setAttribute('aria-current','true'); renderRentals(); }
  else if(view==="downloads"){ document.querySelector('[data-view="downloads"]').setAttribute('aria-current','true'); renderDownloads(); }
  else if(view==="grade"){ const el=document.querySelector(`[data-grade="${arg}"]`); if(el)el.setAttribute('aria-current','true'); if(LEVEL==="secondary"){renderSecondaryGrade(Number(arg));mode="secondary";}else{renderGrade(arg);mode="grade";} }
  else if(view==="dept"){ const el=document.querySelector(`[data-dept="${arg}"]`); if(el)el.setAttribute('aria-current','true'); renderDept(arg); mode="dept"; }
  main.setAttribute("data-mode",mode);
  main.scrollIntoView({behavior:"smooth",block:"start"});
}
function setLevel(lvl){
  LEVEL = lvl;
  document.querySelectorAll('.lt').forEach(b=>{ b.dataset.level===lvl ? b.setAttribute('aria-current','true') : b.removeAttribute('aria-current'); });
  const isCollege = lvl==="college";
  if(!isCollege) buildGradePills(lvl);
  gp.hidden = isCollege;
  coreLabel.hidden = isCollege;
  if(!isCollege) coreLabel.textContent = "Core Academics";
  go("overview");
}
document.querySelectorAll('.lt').forEach(b=>b.addEventListener('click',()=>setLevel(b.dataset.level)));
document.querySelectorAll('.navbtn').forEach(b=>{ if(b.dataset.view) b.addEventListener('click',()=>go(b.dataset.view)); });
gp.addEventListener('click',e=>{ const b=e.target.closest('.gp'); if(b) go('grade',b.dataset.grade); });

  const clone = el.cloneNode(true);
  let author = "";
  const by = clone.querySelector(".by"), b = clone.querySelector("b");
  if(by){ author = by.textContent.replace(/^[—–-]\s*/,"").trim(); by.remove(); }
  else if(b){ author = b.textContent.trim(); b.remove(); }
  const title = clone.textContent.replace(/\s+/g," ").trim();
  if(tag.includes("reading university") || tag.includes("read-aloud")){
    const q = encodeURIComponent((title+" "+author).trim());
    openModal(`<span class="kind">Reading University</span><h3>${title}</h3>
      ${author?`<div class="meta"><div><b>By</b> · ${author}</div></div>`:""}
      <p class="desc">Independent reading from the Reading University list — borrow it free from your local library, or purchase a copy.</p>
      <div class="links"><a href="https://search.worldcat.org/search?q=${q}" target="_blank" rel="noopener">Find in a library ↗</a><a href="https://www.google.com/search?tbm=bks&q=${q}" target="_blank" rel="noopener">Look up the book ↗</a></div>`);
    return;
  }
  const res = findResource(title);
  if(res){
    openModal(`<span class="kind">Textbook · Program</span><h3>${res.title}</h3>
      <div class="meta">
        ${res.by?`<div><b>Author</b> · ${res.by}</div>`:""}
        ${res.pub?`<div><b>Publisher</b> · ${res.pub}</div>`:""}
      </div>
      ${res.note?`<p class="desc">${res.note}</p>`:""}
      <div class="links">${res.link?`<a href="${res.link}" target="_blank" rel="noopener">Publisher &amp; ordering ↗</a>`:""}</div>`);
    return;
  }
  const grpEl = (el.closest(".chips") || el.closest("ul.clean")) ? (el.closest(".chips") || el.closest("ul.clean")).previousElementSibling : null;
  const grp = (grpEl && grpEl.classList.contains("sub-h")) ? grpEl.textContent.toLowerCase() : "";
  const poem = tag.includes("poetry") || tag.includes("poem") || grp.includes("poem");
  const song = tag.includes("music") || grp.includes("song") || grp.includes("music");
  const saying = tag.includes("saying") || grp.includes("saying");
  const lit = tag.includes("literature") || grp.includes("novel") || grp.includes("stor");
  if(poem){
    const pm = findPoem(title);
    const credit = author || (pm && pm.by) || "";
    const src = (pm && pm.link) || `https://www.poetryfoundation.org/search?query=${encodeURIComponent((title+" "+credit).trim())}`;
    const readLink = `<div class="links"><a href="${src}" target="_blank" rel="noopener">Read the full poem ↗</a></div>`;
    if(pm && pm.text){
      openModal(`<span class="kind poem">Poem</span><h3>${title}</h3>
        ${credit?`<div class="meta"><div><b>By</b> · ${credit}</div></div>`:""}
        <pre class="poemtext">${pm.text}</pre>
        <p class="pd">Public domain · text reproduced in full.</p>
        ${readLink}`);
    } else {
      openModal(`<span class="kind poem">Poem</span><h3>${title}</h3>
        ${credit?`<div class="meta"><div><b>By</b> · ${credit}</div></div>`:""}
        <p class="desc">Read the full poem at the linked source below${credit?"":""} — it is also collected in the class anthology, <em>${CK_BOOK}</em>.</p>
        ${readLink}`);
    }
    return;
  }
  let kindLabel="Core Knowledge", kindCls="ck", desc;
  if(song){ kindLabel="Song"; desc=`Part of the music repertoire in the Core Knowledge sequence, collected in <em>${CK_BOOK}</em>.`; }
  else if(saying){ kindLabel="Saying & Phrase"; desc=`A familiar saying taught from the Sayings &amp; Phrases section of <em>${CK_BOOK}</em>.`; }
  else if(lit){ kindLabel="Literature"; desc=`A story or work studied in class, collected in <em>${CK_BOOK}</em>. Read-aloud texts are available free from Core Knowledge.`; }
  else { desc=`A Core Knowledge unit from <em>${CK_BOOK}</em>. The full unit — teaching materials, timeline cards, and online resources — can be downloaded free from Core Knowledge.`; }
  openModal(`<span class="kind ${kindCls}">${kindLabel}</span><h3>${title}</h3>
    ${author?`<div class="meta"><div><b>By</b> · ${author}</div></div>`:""}
    <p class="desc">${desc}</p>
    <div class="links">${ckLink()}</div>`);
}

function openCourseModal(el){
  const name = el.querySelector("h4") ? el.querySelector("h4").textContent : "";
  const gr = el.querySelector(".gr") ? el.querySelector(".gr").textContent : "";
  const trk = el.querySelector(".trk") ? el.querySelector(".trk").textContent.trim() : "Core";
  const cardDesc = el.querySelector("p") ? el.querySelector("p").textContent : "";
  const info = COURSEINFO[name] || {};
  const desc = info.desc || cardDesc;
  const isAP = /AP/.test(trk), isCE = /concurrent/i.test(trk);
  const credit = isAP ? "Carries college credit through the AP exam." : isCE ? "Concurrent enrollment — earns college credit while still in high school." : "";
  openModal(`<span class="kind">Course · ${trk}</span><h3>${name}</h3>
    <div class="meta">
      <div><b>Open to</b> · ${gr}</div>
      <div><b>Track</b> · ${trk}</div>
      ${info.text?`<div><b>Textbook</b> · ${info.text}</div>`:""}
    </div>
    ${desc?`<p class="desc">${desc}</p>`:""}
    ${credit?`<p class="desc"><em>${credit}</em></p>`:""}
    ${info.topics&&info.topics.length?`<div class="trkrow"><div class="chips">${info.topics.map(t=>`<span class="chip">${t}</span>`).join("")}</div></div>`:""}`);
}

main.addEventListener("click",e=>{
  const ruIt = e.target.closest(".chips.ru .chip");
  if(ruIt){ openResourceModal(ruIt); return; }
  const mode = main.dataset.mode;
  const course = e.target.closest(".course");
  if(course && (mode==="secondary"||mode==="dept"||mode==="college")){ openCourseModal(course); return; }
  if(mode==="grade"){ const it = e.target.closest("ul.clean li, .chips .chip"); if(it) openResourceModal(it); }
});

setLevel("primary");
</script>
